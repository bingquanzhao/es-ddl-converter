version: "3.8"

services:
  elasticsearch:
    image: ${ES_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:7.17.25}
    container_name: es-ddl-converter-es
    hostname: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_HTTP_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  doris:
    image: ${DORIS_IMAGE:-apache/doris:4.0.3-all-slim}
    container_name: es-ddl-converter-doris
    hostname: doris
    restart: unless-stopped
    privileged: true
    ports:
      - "${DORIS_FE_HTTP_PORT:-8030}:8030"    # FE HTTP port (Web UI)
      - "${DORIS_FE_MYSQL_PORT:-9030}:9030"    # FE MySQL protocol port
      - "${DORIS_BE_HTTP_PORT:-8040}:8040"     # BE HTTP port
    environment:
      - SKIP_CHECK_ULIMIT=true
    volumes:
      - doris_data:/opt/apache-doris
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 9030 -uroot -e 'SHOW BACKENDS\\G' | grep -q 'Alive: true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  es_data:
  doris_data:
